<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚕 Terminal Booking System</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="container">
    <header>
        <h1>🚕 Terminal Booking System</h1>
        <p class="subtitle">Professional Trip Management</p>
    </header>

    <div id="totalCount" class="earnings-box">
        <h3>Today's Earnings: <strong>0 KD</strong></h3>
        <p>0 trips completed</p>
    </div>

    <section class="form-section">
        <h2>📝 New Trip Booking</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="passenger">Passenger Name *</label>
                <input id="passenger" type="text" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label for="passport">Passport Number *</label>
                <input id="passport" type="text" placeholder="Passport ID" required>
                <button type="button" id="scanBtn" style="margin-top: 5px; width: auto;">📱 Scan</button>
            </div>
            <div class="form-group">
                <label for="driver">Driver Name *</label>
                <input id="driver" type="text" placeholder="Driver name" required>
            </div>
            <div class="form-group">
                <label for="destination">Destination *</label>
                <input id="destination" type="text" placeholder="Where to?" required>
            </div>
            <div class="form-group">
                <label for="type">Trip Type *</label>
                <select id="type" required>
                    <option value="Local">Local</option>
                    <option value="City Taxi">City Taxi</option>
                    <option value="Bus">Bus</option>
                    <option value="Long-Distance">Long-Distance</option>
                    <option value="VIP">VIP</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fare">Fare (KD) *</label>
                <input id="fare" type="number" placeholder="0.00" min="0" step="0.01" required>
            </div>
        </div>

        <div class="button-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn-primary" onclick="saveTrip()">💾 Save Trip</button>
            <button class="btn-primary" style="background: #6b7280;" type="button" onclick="clearForm()">🔄 Clear</button>
            <button class="btn-primary" style="background: #059669;" type="button" onclick="exportToCSV()">📥 Export CSV</button>
        </div>
    </section>

    <section class="search-section">
        <h2>🔍 Search Trips</h2>
        <input type="text" id="searchInput" placeholder="Search by passenger, driver, destination..." class="search-box">
    </section>

    <section class="trips-section">
        <h2>📋 All Bookings</h2>
        <div id="pagination"></div>
        <div class="table-wrapper">
            <table id="tripsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Passenger</th>
                        <th>Passport</th>
                        <th>Driver</th>
                        <th>Destination</th>
                        <th>Type</th>
                        <th>Fare</th>
                        <th>Date/Time</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tripsBody"></tbody>
            </table>
        </div>
        <div id="noTrips" class="no-data" style="text-align: center; padding: 40px;">
            No trips yet.
        </div>
    </section>
</div>

<!-- Scripts in correct order -->
<script src="js/core/logger.js"></script>
<script src="js/core/helpers.js"></script>
<script src="js/core/sanitizer.js"></script>
<script src="js/core/api.js"></script>
<script src="js/services/offline.js"></script>
<script src="js/services/printer.js"></script>
<script src="js/features/scanner.js"></script>
<script src="js/pagination.js"></script>
<script src="js/app.js"></script>

</body>
</html>
